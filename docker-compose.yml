services:
  database:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ecotrans-net

  backend_api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:${DATABASE_PORT}/${POSTGRES_DB}
      INITIALIZE_DB: "true"
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - database
    volumes:
      - ./backend:/app
    networks:
      - ecotrans-net

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend_api
    networks:
      - ecotrans-net

volumes:
  db_data:

networks:
  ecotrans-net:
    name: ecotrans-net
